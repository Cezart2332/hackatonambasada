services:
  db:
    image: pgvector/pgvector:pg16
    env_file:
      - .env
    ports:
      - "5433:5432"
    volumes:
      - warmleads_pg:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-pgvector.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U warmleads -d warmleads"]
      interval: 5s
      timeout: 5s
      retries: 10

  ai:
    build:
      context: ./ai-service
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./server
    ports:
      - "3001:3001"
    env_file:
      - .env
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s
    depends_on:
      db:
        condition: service_healthy
      ai:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    env_file:
      - .env
    volumes:
      - ./:/app
      - /app/node_modules
    depends_on:
      backend:
        condition: service_healthy

volumes:
  warmleads_pg:

networks:
  default:
    name: warmleads-net
    driver: bridge
